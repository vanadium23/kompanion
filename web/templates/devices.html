{{define "content"}}
<main>
    <header>
        <h1>设备管理</h1>
    </header>

    {{if .error}}
    <blockquote class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4" role="alert">
        <p>{{.error}}</p>
    </blockquote>
    {{end}}

    <section>
        <h2>添加新设备</h2>
        <form action="/devices/add" method="POST" class="grid">
            <input type="text" name="设备名" required placeholder="请输入设备名">
            <input type="text" name="密码" required placeholder="请输入密码">
            <button type="submit">添加设备</button>
        </form>
    </section>

    <section>
        <h2>已添加设备</h2>
        {{if .devices}}
        <table>
            <thead>
                <tr>
                    <th>设备名</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                {{range .devices}}
                <tr>
                    <td>{{.Name}}</td>
                    <td>
                        <form action="/devices/deactivate/{{.Name}}" method="POST">
                            <button type="submit"
                                onclick="return confirm('确定要停用吗?')">
                                停用
                            </button>
                        </form>
                    </td>
                </tr>
                {{end}}
            </tbody>
        </table>
        {{else}}
        <p><em>还没有添加设备</em></p>
        {{end}}
    </section>
</main>
{{end}}
