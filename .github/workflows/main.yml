name: Build and Push Kompanion Docker Image

on:
  push:
    branches: [ "main" ]  # 每次 push 到 main 分支触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout 代码
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ 登录 GHCR
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}   # 这里使用你仓库的 PAT Secret

      # 3️⃣ 构建并推送 Docker 镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/kompanion:latest
